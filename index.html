<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Barbershop</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
}

/* Header Section */
header {
  background: black;
  padding: 20px;
}

/* Profile Picture */
.profile img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 4px solid gold;
  margin-top: 10px;
}

/* Title */
h1 {
  color: gold;
  margin: 10px 0;
}

/* Section Style */
section {
  padding: 20px;
}

/* Services Box */
.service {
  background: #222;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

/* Button */
button {
  background: gold;
  color: black;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  margin-top: 15px;
}

/* Footer */
footer {
  background: black;
  padding: 15px;
  margin-top: 20px;
}

</style>

</head>

<body>

<header>

<div class="profile">
<img src="alpha.png" alt="Alpha Photo">
</div>

<h1>ALPHA BARBERSHOP</h1>
<p>Fresh Cuts • Clean Style • Professional Look</p>

</header>

<section>

<h2>Our Services</h2>

<div class="service">
<h3>Haircut</h3>
<p>Clean and sharp haircut.</p>
</div>

<div class="service">
<h3>Shaving</h3>
<p>Smooth professional shaving.</p>
</div>

<div class="service">
<h3>Hair Styling</h3>
<p>Modern and classic styles.</p>
</div>

<button>Book Appointment</button>

</section>

<footer>

<p>📍 Ghana | Alpha Barbershop</p>
<p>© 2026 Alpha Barbershop</p>

</footer>

</body>
</html>
